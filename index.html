<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi e-KGB Donggala</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (untuk JSX di Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FontAwesome (Untuk Ikon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        @media print {
            body { 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                margin: 0;
                padding: 0;
                background: white;
            }
            @page {
                margin: 0.5cm;
            }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        // =========================================================================
        // PENTING: Ganti URL di bawah dengan URL WEB APP Google Apps Script Anda!
        // =========================================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqrNzi0iRtb3v2q_p4jFgG8YNH4-fTm2XgsrwBt8B5QDmkTyOpWHolr3XPXa9QDg2keA/exec";

        const { useState, useEffect, useRef } = React;

        // --- Pilihan Golongan ---
        const GOLONGAN_OPTIONS = [
            "Juru Muda, I/a", "Juru Muda Tingkat I, I/b", "Juru, I/c", "Juru Tingkat I, I/d",
            "Pengatur Muda, II/a", "Pengatur Muda Tingkat I, II/b", "Pengatur, II/c", "Pengatur Tingkat I, II/d",
            "Penata Muda, III/a", "Penata Muda Tingkat I, III/b", "Penata, III/c", "Penata Tingkat I, III/d"
        ];

        // --- Utils: Terbilang ---
        const terbilang = (angka) => {
            const bilangan = ['', 'Satu', 'Dua', 'Tiga', 'Empat', 'Lima', 'Enam', 'Tujuh', 'Delapan', 'Sembilan', 'Sepuluh', 'Sebelas'];
            if (angka < 12) return bilangan[angka];
            if (angka < 20) return terbilang(angka - 10) + ' Belas';
            if (angka < 100) return terbilang(Math.floor(angka / 10)) + ' Puluh ' + terbilang(angka % 10);
            if (angka < 200) return 'Seratus ' + terbilang(angka - 100);
            if (angka < 1000) return terbilang(Math.floor(angka / 100)) + ' Ratus ' + terbilang(angka % 100);
            if (angka < 2000) return 'Seribu ' + terbilang(angka - 1000);
            if (angka < 1000000) return terbilang(Math.floor(angka / 1000)) + ' Ribu ' + terbilang(angka % 1000);
            if (angka < 1000000000) return terbilang(Math.floor(angka / 1000000)) + ' Juta ' + terbilang(angka % 1000000);
            return 'Nominal terlalu besar';
        };

        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        const formatDate = (dateString) => {
            if (!dateString) return '';
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            const d = new Date(dateString);
            return `${d.getDate().toString().padStart(2, '0')} ${months[d.getMonth()]} ${d.getFullYear()}`;
        };

        const getBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // --- TABEL GAJI POKOK PNS (PP NO 5 TAHUN 2024) ---
        const TABEL_GAJI_PNS = {
            "I/A": {0:1685700, 2:1738800, 4:1793500, 6:1850000, 8:1908300, 10:1968400, 12:2030400, 14:2094300, 16:2160300, 18:2228300, 20:2298500, 22:2370900, 24:2445500, 26:2522600},
            "I/B": {3:1840800, 5:1898800, 7:1958600, 9:2020300, 11:2083900, 13:2149600, 15:2217300, 17:2287100, 19:2359100, 21:2433400, 23:2510100, 25:2589100, 27:2670700},
            "I/C": {3:1918700, 5:1979100, 7:2041500, 9:2105800, 11:2172100, 13:2240500, 15:2311100, 17:2383900, 19:2458900, 21:2536400, 23:2616300, 25:2698700, 27:2783700},
            "I/D": {3:1999900, 5:2062900, 7:2127800, 9:2194800, 11:2264000, 13:2335300, 15:2408800, 17:2484700, 19:2562900, 21:2645700, 23:2726900, 25:2812800, 27:2901400},
            "II/A": {0:2184000, 1:2218400, 3:2288200, 5:2360300, 7:2434600, 9:2511300, 11:2590400, 13:2672000, 15:2756200, 17:2843000, 19:2932500, 21:3024900, 23:3120100, 25:3218400, 27:3319800, 29:3424300, 31:3532200, 33:3643400},
            "II/B": {3:2385000, 5:2460100, 7:2537600, 9:2617500, 11:2700000, 13:2785000, 15:2872700, 17:2963200, 19:3056500, 21:3152800, 23:3252100, 25:3354500, 27:3460200, 29:3569200, 31:3681600, 33:3797500},
            "II/C": {3:2485900, 5:2564200, 7:2645000, 9:2728300, 11:2814200, 13:2902800, 15:2994300, 17:3088600, 19:3185800, 21:3286200, 23:3389700, 25:3496400, 27:3606500, 29:3720100, 31:3837300, 33:3985200},
            "II/D": {3:2591100, 5:2672700, 7:2756800, 9:2843700, 11:2933200, 13:3025600, 15:3120900, 17:3219200, 19:3320600, 21:3425200, 23:3533100, 25:3644300, 27:3759100, 29:3877500, 31:3999600, 33:4125600},
            "III/A": {0:2785700, 2:2873500, 4:2964000, 6:3057300, 8:3153600, 10:3252900, 12:3355400, 14:3461100, 16:3570100, 18:3682500, 20:3798500, 22:3918100, 24:4041500, 26:4168800, 28:4300100, 30:4435500, 32:4575200},
            "III/B": {0:2903600, 2:2995000, 4:3089300, 6:3186600, 8:3287000, 10:3390500, 12:3497300, 14:3607500, 16:3721100, 18:3838300, 20:3959200, 22:4083900, 24:4212500, 26:4345100, 28:4482000, 30:4623200, 32:4768800},
            "III/C": {0:3026400, 2:3121700, 4:3220000, 6:3321400, 8:3426000, 10:3533900, 12:3645200, 14:3760100, 16:3878500, 18:4000600, 20:4126600, 22:4256600, 24:4390700, 26:4528900, 28:4671600, 30:4818700, 32:4970500},
            "III/D": {0:3154400, 2:3253700, 4:3356200, 6:3461900, 8:3571000, 10:3683400, 12:3799400, 14:3919100, 16:4042500, 18:4169900, 20:4301200, 22:4436700, 24:4576400, 26:4720500, 28:4869200, 30:5022500, 32:5180700}
        };

        const hitungGajiBaru = (golonganStr, mkgTahun) => {
            const match = golonganStr.match(/(I|II|III)\/[a-d]/i);
            if (!match) return null;
            
            const golKey = match[0].toUpperCase();
            const tableGol = TABEL_GAJI_PNS[golKey];
            if (!tableGol) return null;

            const years = Object.keys(tableGol).map(Number).sort((a,b)=>a-b);
            let closestYear = years[0];
            for (let y of years) {
                if (mkgTahun >= y) {
                    closestYear = y;
                } else {
                    break;
                }
            }
            return tableGol[closestYear];
        };

        // --- Component: Signature Pad ---
        const SignaturePad = ({ onSave, onCancel }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            }, []);

            const getCoordinates = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                if (e.touches && e.touches.length > 0) {
                    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
                }
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            };

            const startDrawing = (e) => { e.preventDefault(); setIsDrawing(true); const { x, y } = getCoordinates(e); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); };
            const draw = (e) => { if (!isDrawing) return; e.preventDefault(); const { x, y } = getCoordinates(e); const ctx = canvasRef.current.getContext('2d'); ctx.lineTo(x, y); ctx.stroke(); };
            const stopDrawing = () => setIsDrawing(false);
            const clearCanvas = () => { const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); };
            const saveSignature = () => { const dataUrl = canvasRef.current.toDataURL('image/png'); onSave(dataUrl); };

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                        <div className="p-4 bg-slate-800 text-white flex justify-between items-center">
                            <h3 className="font-bold"><i className="fas fa-pen-nib mr-2"></i>Tanda Tangan Kadis</h3>
                            <button onClick={onCancel} className="text-slate-300 hover:text-white"><i className="fas fa-times-circle text-xl"></i></button>
                        </div>
                        <div className="p-4 flex-grow flex flex-col items-center bg-slate-50">
                            <p className="text-sm text-slate-500 mb-2 text-center">Silakan tanda tangan di dalam kotak di bawah ini.</p>
                            <div className="border-2 border-dashed border-slate-300 rounded-lg bg-white overflow-hidden touch-none w-full flex justify-center">
                                <canvas ref={canvasRef} width={320} height={200} className="touch-none cursor-crosshair bg-white"
                                    onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
                                    onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                            </div>
                        </div>
                        <div className="p-4 border-t flex gap-2 justify-end bg-white">
                            <button onClick={clearCanvas} className="px-4 py-2 text-slate-600 bg-slate-100 rounded-lg">Ulangi</button>
                            <button onClick={saveSignature} className="px-4 py-2 text-white bg-blue-600 rounded-lg font-medium">Simpan TTD</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Component: Dokumen Template (Surat KGB) ---
        const SuratBerkala = ({ data }) => {
            if (!data) return null;
            const currentYear = new Date().getFullYear();

            let sigUrl = data.signatureKadis;
            if (sigUrl && sigUrl.includes('/file/d/')) {
                const match = sigUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    sigUrl = `https://lh3.googleusercontent.com/d/${match[1]}`;
                }
            }

            // --- QR CODE DINAMIS DENGAN LOGO DONGGALA ---
            const qrDataText = `e-KGB Disdikpora Donggala\nNama: ${data.nama}\nNIP: ${data.nip}\nGol: ${data.pangkatGol}\nGaji Baru: ${formatRupiah(data.gajiBaru)}\nTMT: ${formatDate(data.tglBerlaku)}`;
            const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&ecc=H&data=${encodeURIComponent(qrDataText)}`;
            const logoDonggalaUrl = "https://i.ibb.co.com/5xhN0cm1/Logo-Donggala.png";

            return (
                <div className="bg-white w-full max-w-4xl mx-auto shadow-xl border font-serif text-sm relative overflow-hidden text-black" style={{ minHeight: '297mm', padding: '2cm' }}>
                    <div className="flex items-center justify-center border-b-4 border-black pb-4 mb-6">
                        <div className="w-24 flex-shrink-0">
                            <img src={logoDonggalaUrl} alt="Logo Donggala" className="w-full h-auto" />
                        </div>
                        <div className="text-center flex-grow px-4">
                            <h2 className="text-xl font-bold uppercase tracking-wide">PEMERINTAH KABUPATEN DONGGALA</h2>
                            <h1 className="text-2xl font-bold uppercase tracking-wider mt-1 mb-1">DINAS PENDIDIKAN PEMUDA DAN OLAHRAGA</h1>
                            <p className="text-sm">Alamat: Jalan Jati Gunung Bale Telp. (0457) 71775-71885 Donggala</p>
                        </div>
                        <div className="w-24 flex-shrink-0"></div>
                    </div>

                    <div className="flex justify-between mb-8">
                        <div>
                            <table className="w-full">
                                <tbody>
                                    <tr><td className="w-16">Nomor</td><td className="w-4">:</td><td>12/822.2/DISDIKPORA/{currentYear}</td></tr>
                                    <tr><td>Lamp.</td><td>:</td><td>-</td></tr>
                                    <tr><td>Perihal</td><td>:</td><td className="font-bold underline">KENAIKAN GAJI BERKALA</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div className="text-right">
                            <p>Donggala, {formatDate(new Date().toISOString())}</p><br/>
                            <p>Kepada</p><p>Yth. Kepala Badan Pengelolaan</p><p>Keuangan dan Aset Daerah</p>
                            <p>Kabupaten Donggala</p><p>di -</p><p className="ml-8 font-bold">Donggala</p>
                        </div>
                    </div>

                    <div className="mb-6 text-justify">
                        <p className="mb-4">Dengan ini diberitahukan bahwa berhubung dengan telah dipenuhinya masa kerja dan syarat-syarat lainnya kepada:</p>
                        <table className="w-full mb-4 ml-4">
                            <tbody>
                                <tr><td className="w-6">1.</td><td className="w-48">Nama</td><td className="w-4">:</td><td className="font-bold">{data.nama}</td></tr>
                                <tr><td>2.</td><td>NIP</td><td>:</td><td>{data.nip}</td></tr>
                                <tr><td>3.</td><td>Tempat dan Tanggal Lahir</td><td>:</td><td>{data.tempatLahir}, {formatDate(data.tanggalLahir)}</td></tr>
                                <tr><td>4.</td><td>Pangkat/Gol</td><td>:</td><td>{data.pangkatGol}</td></tr>
                                <tr><td>5.</td><td>Jabatan</td><td>:</td><td>{data.jabatan}</td></tr>
                                <tr><td>6.</td><td>Unit Kerja</td><td>:</td><td>{data.unitKerja}</td></tr>
                                <tr><td>7.</td><td>Gaji Pokok Lama</td><td>:</td><td>{formatRupiah(data.gajiLama)}</td></tr>
                            </tbody>
                        </table>

                        <p className="mb-4">Atas dasar Surat Keputusan terakhir tentang gaji/pangkat yang ditetapkan:</p>
                        <table className="w-full mb-4 ml-4">
                            <tbody>
                                <tr><td className="w-6">a.</td><td className="w-48">Oleh Pejabat</td><td className="w-4">:</td><td>Kepala Dinas Pendidikan</td></tr>
                                <tr><td>b.</td><td>Nomor dan Tanggal SK</td><td>:</td><td>50/822.2/DISDIKBUD, {formatDate(data.tglGajiLama)}</td></tr>
                                <tr><td>c.</td><td>Tgl. Mulai berlakunya gaji tsb (TMT)</td><td>:</td><td>{formatDate(data.tmtLama || data.tglGajiLama)}</td></tr>
                                <tr><td>d.</td><td>Masa Kerja Gol. Pada tgl. tsb</td><td>:</td><td>{data.masaKerjaLamaTahun} Tahun {data.masaKerjaLamaBulan} Bulan</td></tr>
                            </tbody>
                        </table>

                        <p className="mb-4 font-bold">Diberikan Kenaikan Gaji Berkala hingga memperoleh:</p>
                        <table className="w-full mb-4 ml-4 font-bold">
                            <tbody>
                                <tr><td className="w-6">8.</td><td className="w-48">Gaji Pokok Baru</td><td className="w-4">:</td><td>{formatRupiah(data.gajiBaru)}</td></tr>
                                <tr><td></td><td colSpan="3" className="italic font-normal">(Terbilang: {terbilang(data.gajiBaru)} Rupiah)</td></tr>
                                <tr><td>9.</td><td>Berdasarkan Masa Kerja</td><td>:</td><td>{data.masaKerjaBaruTahun} Tahun {data.masaKerjaBaruBulan} Bulan</td></tr>
                                <tr><td>10.</td><td>Dalam Golongan</td><td>:</td><td>{data.pangkatGol.split(',')[1]?.trim() || data.pangkatGol}</td></tr>
                                <tr><td>11.</td><td>Mulai Berlaku Tanggal</td><td>:</td><td>{formatDate(data.tglBerlaku)}</td></tr>
                                <tr><td>12.</td><td>Kenaikan gaji berkala yad</td><td>:</td><td></td></tr>
                                <tr><td></td><td>Jika memenuhi syarat tgl</td><td>:</td><td>{formatDate(data.tglBerkalaBerikutnya)}</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div className="flex justify-between items-end mt-12 mb-16 relative">
                        
                        {/* BAGIAN KIRI: QR CODE & LOGO OVERLAY DONGGALA */}
                        <div className="w-48 flex flex-col items-center ml-4">
                             <div className="relative w-24 h-24 mb-1 p-1 bg-white border border-gray-300 rounded flex items-center justify-center">
                                 <img src={qrCodeUrl} alt="QR Code Keaslian" className="w-full h-full object-contain" crossOrigin="anonymous" />
                                 {/* Logo Donggala diletakkan absolut tepat di tengah QR Code (Dihapus crossOrigin agar tidak Error) */}
                                 <img src={logoDonggalaUrl} alt="Logo Donggala" className="absolute w-6 h-6 bg-white p-0.5 rounded shadow-sm top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2" />
                             </div>
                             <p className="text-[12px] font-bold text-center text-blue-800 italic mt-1">Scan QR</p>
                        </div>

                        {/* BAGIAN KANAN: TANDA TANGAN */}
                        <div className="w-64 text-center z-10">
                            <p>a.n. BUPATI DONGGALA</p>
                            <p className="mb-4">KEPALA DINAS,</p>
                            
                            <div className="h-24 relative flex items-center justify-center">
                                {sigUrl ? (
                                    <img src={sigUrl} alt="Tanda Tangan Kadis" className="h-28 object-contain absolute mix-blend-multiply" style={{top: '-10px', left: '10px'}} crossOrigin="anonymous" />
                                ) : (
                                    <div className="text-gray-300 italic text-xs">(Belum Ditandatangani)</div>
                                )}
                            </div>

                            <p className="font-bold underline mt-2">ANSYAR SUTIADI, S.Sos., M.Si</p>
                            <p>Pembina Utama Muda, IV/c</p>
                            <p>NIP. 197212131992031004</p>
                        </div>
                    </div>

                    <div className="mt-8 text-xs border-t pt-4">
                        <p className="font-bold underline mb-1">Tembusan Surat ini disampaikan Kepada Yth:</p>
                        <ol className="list-decimal pl-4 grid grid-cols-2 gap-x-4">
                            <li>Kepala Badan Pemeriksa Keuangan di Jakarta;</li>
                            <li>Menteri Dalam Negeri (Biro Kepegawaian) di Jakarta;</li>
                            <li>Kepala Badan Kepegawaian Negara di Jakarta;</li>
                            <li>Kepala Biro Pensiunan dan Tunjangan BKN di Jakarta;</li>
                            <li>Kepala Kantor Regional IV BKN Makassar;</li>
                            <li>Kepala BKD Prop. Sulteng di Palu;</li>
                            <li>Kepala Kantor PT. TASPEN (Persero) Cabang Palu;</li>
                            <li>Saudara/i {data.nama} (Yang bersangkutan).</li>
                        </ol>
                    </div>
                </div>
            );
        };

        const AppLayout = ({ children, title, user, isLoading, onLogout, onRefresh }) => (
            <div className="min-h-screen bg-slate-100">
                <nav className="bg-blue-700 text-white shadow-md sticky top-0 z-40">
                    <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <img src="https://i.ibb.co.com/5xhN0cm1/Logo-Donggala.png" alt="Logo" className="w-8 h-8 object-contain bg-white rounded-full p-1" />
                            <span className="font-bold hidden sm:inline">e-KGB Donggala</span>
                            <span className="bg-blue-800 px-3 py-1 rounded-full text-xs font-medium ml-2 border border-blue-600">
                                {user.role === 'pegawai' ? 'Pemohon' : user.role === 'verifikator' ? 'Verifikator' : 'Kepala Dinas'}
                            </span>
                        </div>
                        <div className="flex items-center gap-4 text-sm">
                            {user.role === 'pegawai' && <span className="hidden sm:inline">{user.data.nama} ({user.data.nip})</span>}
                            <button onClick={onLogout} className="flex items-center gap-2 hover:text-blue-200 bg-blue-800 px-3 py-1.5 rounded-lg">
                                <i className="fas fa-sign-out-alt"></i> Keluar
                            </button>
                        </div>
                    </div>
                </nav>
                <main className="max-w-7xl mx-auto px-4 py-8 relative">
                    {isLoading && (
                        <div className="absolute top-0 left-0 w-full h-1 bg-blue-200 overflow-hidden rounded-t-lg z-50">
                            <div className="h-full bg-blue-600 animate-pulse">Loading...</div>
                        </div>
                    )}
                    <div className="flex items-center justify-between mb-6">
                        <h2 className="text-2xl font-bold text-slate-800">{title}</h2>
                        <button onClick={onRefresh} className="text-blue-600 bg-white border px-3 py-1 text-sm rounded hover:bg-blue-50"><i className="fas fa-sync-alt mr-1"></i> Refresh</button>
                    </div>
                    {children}
                </main>
            </div>
        );

        // --- Main App ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [applications, setApplications] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            
            // Login View State
            const [loginTab, setLoginTab] = useState('pegawai');

            // Form States
            const [loginForm, setLoginForm] = useState({ nip: '', nama: '', wa: '' });
            const [authForm, setAuthForm] = useState({ username: '', password: '' });
            const [formData, setFormData] = useState({
                tempatLahir: '', tanggalLahir: '', pangkatGol: '', jabatan: '', unitKerja: '',
                gajiLama: '', tglGajiLama: '', tmtLama: '', masaKerjaLamaTahun: '', masaKerjaLamaBulan: '',
                fileBerkalaLama: null
            });
            const [fileBerkalaObj, setFileBerkalaObj] = useState(null);
            const [fileFinalObj, setFileFinalObj] = useState(null);

            const [activeTab, setActiveTab] = useState('list');
            const [selectedApp, setSelectedApp] = useState(null);
            const [showSignaturePad, setShowSignaturePad] = useState(false);
            const [showDocumentPreview, setShowDocumentPreview] = useState(false);

            useEffect(() => {
                if(SCRIPT_URL !== "MASUKKAN_URL_WEB_APP_GOOGLE_APPS_SCRIPT_DISINI") {
                    fetchData();
                }
            }, []);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(SCRIPT_URL);
                    const result = await response.json();
                    if(result.status === 'success') {
                        setApplications(result.data);
                    }
                } catch(err) {
                    console.error("Gagal load data", err);
                }
                setIsLoading(false);
            };

            const handleLogout = () => {
                setUser(null); 
                setSelectedApp(null); 
                setShowDocumentPreview(false);
                setAuthForm({ username: '', password: '' });
            };

            const handlePegawaiNipChange = (e) => {
                const val = e.target.value;
                const foundPegawai = applications.find(app => app.nip === val);
                
                if (foundPegawai) {
                    setLoginForm({ nip: val, nama: foundPegawai.nama, wa: foundPegawai.wa });
                } else {
                    setLoginForm({ ...loginForm, nip: val });
                }
            };

            const handlePegawaiWaChange = (e) => {
                // Hanya izinkan angka untuk nomor telepon, mencegah error NIP diisi ke WA
                const val = e.target.value.replace(/\D/g, '');
                setLoginForm({ ...loginForm, wa: val });
            };

            const handleLoginPegawai = (e) => {
                e.preventDefault();
                
                // Mencegah NIP dimasukkan ke kolom WhatsApp (NIP biasanya 18 digit, No HP max 15 digit)
                if (loginForm.wa.length >= 16) {
                    alert("Nomor WhatsApp tidak valid. Tolong pastikan Anda tidak memasukkan NIP ke dalam kolom No. WhatsApp.");
                    return;
                }

                if(loginForm.nip && loginForm.nama) {
                    setUser({ role: 'pegawai', data: loginForm });
                    setActiveTab('list');
                }
            };

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                if(SCRIPT_URL === "MASUKKAN_URL_WEB_APP_GOOGLE_APPS_SCRIPT_DISINI") {
                    alert("URL SCRIPT BELUM DIISI!"); return;
                }
                setIsLoading(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'LOGIN', data: { role: loginTab, ...authForm } })
                    });
                    const resJson = await response.json();
                    
                    if(resJson.status === 'success') {
                        setUser({ role: loginTab, data: { nama: loginTab === 'kadis' ? 'Kepala Dinas' : 'Verifikator Admin' } });
                        setActiveTab('verify');
                    } else {
                        alert(resJson.message); 
                    }
                } catch(err) {
                    alert("Koneksi gagal. Cek jaringan.");
                }
                setIsLoading(false);
            };

            const handleGolonganChange = (e) => {
                const val = e.target.value;
                setFormData({...formData, pangkatGol: val});
                
                if (/(IV)\/[a-e]/i.test(val)) {
                    alert("PEMBERITAHUAN:\nUntuk Golongan IV (IV/a, IV/b, dst) diproses langsung oleh BKPSDM Kab/Kota.\nSilakan arahkan pemohon ke instansi terkait.");
                }
            };

            const submitApplication = async (e) => {
                e.preventDefault();
                if(SCRIPT_URL === "MASUKKAN_URL_WEB_APP_GOOGLE_APPS_SCRIPT_DISINI") {
                    alert("Error: URL Google Apps Script belum disetting di file HTML!");
                    return;
                }

                if (/(IV)\/[a-e]/i.test(formData.pangkatGol)) {
                    alert("Pengajuan Dibatalkan.\nSistem ini tidak dapat memproses Kenaikan Gaji Berkala untuk Golongan IV. Silakan proses di BKPSDM Kab/Kota.");
                    return;
                }

                setIsLoading(true);
                let base64File = null;
                if(fileBerkalaObj) {
                    base64File = await getBase64(fileBerkalaObj);
                }

                const tmtLamaDate = new Date(formData.tmtLama || formData.tglGajiLama);
                const tmtBaruDate = new Date(tmtLamaDate);
                tmtBaruDate.setFullYear(tmtBaruDate.getFullYear() + 2);
                
                const tglNextDate = new Date(tmtBaruDate);
                tglNextDate.setFullYear(tglNextDate.getFullYear() + 2);

                const autoMkTahun = parseInt(formData.masaKerjaLamaTahun || 0) + 2;
                const autoMkTahunStr = autoMkTahun.toString();
                
                let autoGajiBaru = (parseInt(formData.gajiLama || 0) + 100400).toString(); 
                
                const gajiDariTabel = hitungGajiBaru(formData.pangkatGol, autoMkTahun);
                if (gajiDariTabel !== null) {
                    autoGajiBaru = gajiDariTabel.toString();
                }

                const newApp = {
                    id: Date.now().toString(),
                    timestamp: new Date().toISOString(),
                    ...user.data,
                    ...formData,
                    gajiBaru: autoGajiBaru,
                    masaKerjaBaruTahun: autoMkTahunStr,
                    masaKerjaBaruBulan: formData.masaKerjaLamaBulan,
                    tglBerlaku: tmtBaruDate.toISOString().split('T')[0],
                    tglBerkalaBerikutnya: tglNextDate.toISOString().split('T')[0],
                    fileBerkalaLamaBase64: base64File
                };

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'CREATE', data: newApp })
                    });
                    const resJson = await response.json();
                    if(resJson.status === 'success') {
                        alert('Pengajuan berhasil dikirim!\nData usulan Gaji & TMT Baru telah dihitung otomatis oleh sistem.');
                        setActiveTab('list');
                        setFormData({
                            tempatLahir: '', tanggalLahir: '', pangkatGol: '', jabatan: '', unitKerja: '',
                            gajiLama: '', tglGajiLama: '', tmtLama: '', masaKerjaLamaTahun: '', masaKerjaLamaBulan: '',
                            fileBerkalaLama: null
                        });
                        setFileBerkalaObj(null);
                        fetchData();
                    }
                } catch(error) {
                    alert('Gagal mengirim data: ' + error.message);
                }
                setIsLoading(false);
            };

            const updateStatusKeDatabase = async (id, newStatus, extraData = {}) => {
                setIsLoading(true);
                try {
                    const payload = { id: id, newStatus: newStatus, ...extraData };
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'UPDATE_STATUS', data: payload })
                    });
                    const resJson = await response.json();
                    if(resJson.status === 'success') {
                        if(resJson.signatureKadis) {
                            setApplications(apps => apps.map(app => 
                                app.id === id ? { ...app, status: newStatus, signatureKadis: resJson.signatureKadis } : app
                            ));
                        } else {
                            fetchData(); 
                        }
                        setSelectedApp(null);
                        setShowDocumentPreview(false);
                    } else {
                        alert('Gagal: ' + resJson.message);
                    }
                } catch(error) {
                    alert('Terjadi kesalahan jaringan');
                }
                setIsLoading(false);
            };

            const handleKadisSign = (signatureDataUrl) => {
                updateStatusKeDatabase(selectedApp.id, 'SIGNED', { signatureKadisBase64: signatureDataUrl });
                setShowSignaturePad(false);
            };

            const handleUploadFinal = async () => {
                if(!fileFinalObj) {
                    alert("Silakan pilih file PDF SK Final terlebih dahulu yang sudah di-scan/cetak!");
                    return;
                }
                const base64Final = await getBase64(fileFinalObj);
                updateStatusKeDatabase(selectedApp.id, 'COMPLETED', { fileFinalBase64: base64Final });
                setFileFinalObj(null);
                alert('File KGB final berhasil diunggah. Status pengajuan sekarang Selesai.');
            };

            const handlePrint = () => {
                window.print();
            };

            // --- FUNGSI WA OTOMATIS: Anti Error Salah Input Nomor ---
            const handleWA = (waNumber, nama, status) => {
                let phone = String(waNumber).replace(/\D/g, ''); 
                
                // Mencegah error jika data di database terlanjur berisi NIP pemohon (18 digit angka / awalan 19)
                if (phone.length >= 16 || phone.startsWith('19')) {
                    alert("Gagal Buka WhatsApp.\n\nData No. HP pemohon ini tampaknya salah (Sepertinya berisi NIP: " + phone + ").\nSilakan hapus data pengajuan tes ini dan ajukan ulang dengan No WA yang benar.");
                    return;
                }

                // Normalisasi ke +62 standar Indonesia
                if (phone.startsWith('0')) {
                    phone = '62' + phone.substring(1); 
                } else if (phone.startsWith('8')) {
                    phone = '62' + phone; 
                } else if (!phone.startsWith('62')) {
                    phone = '62' + phone; 
                }
                
                let text = `Halo Bapak/Ibu ${nama},\n\n`;
                if (status === 'SUBMITTED') text += `Pengajuan KGB Anda telah kami terima dan akan segera diproses verifikasi.`;
                else if (status === 'VERIFIED') text += `Pengajuan KGB Anda telah diverifikasi dan saat ini sedang menunggu persetujuan (Tanda Tangan) Kepala Dinas.`;
                else if (status === 'SIGNED') text += `Pengajuan KGB Anda telah disetujui & ditandatangani Kepala Dinas. Saat ini dalam proses cetak.`;
                else if (status === 'COMPLETED') text += `Proses pembuatan SK KGB Anda telah *SELESAI*. Silakan login ke aplikasi e-KGB untuk melihat dan mengunduh berkas Anda.`;
                
                text += `\n\nSilakan cek status dan unduh dokumen Anda secara mandiri pada tautan berikut:\nhttps://dikporadonggala-lab.github.io/e-KGBdisdikpora/`;
                
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
            };

            const getStatusBadge = (status) => {
                switch(status) {
                    case 'SUBMITTED': return <span className="bg-amber-100 text-amber-800 px-2 py-1 rounded text-xs font-bold w-max"><i className="fas fa-clock mr-1"></i>Menunggu Verifikasi</span>;
                    case 'VERIFIED': return <span className="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-bold w-max"><i className="fas fa-shield-alt mr-1"></i>Menunggu TTD Kadis</span>;
                    case 'SIGNED': return <span className="bg-purple-100 text-purple-800 px-2 py-1 rounded text-xs font-bold w-max"><i className="fas fa-file-signature mr-1"></i>Siap Cetak & Upload</span>;
                    case 'COMPLETED': return <span className="bg-emerald-100 text-emerald-800 px-2 py-1 rounded text-xs font-bold w-max"><i className="fas fa-check-circle mr-1"></i>Selesai</span>;
                    case 'REJECTED': return <span className="bg-red-100 text-red-800 px-2 py-1 rounded text-xs font-bold w-max"><i className="fas fa-times-circle mr-1"></i>Ditolak</span>;
                    default: return null;
                }
            };

            const renderViews = () => {
                if (!user) {
                    return (
                        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-4xl overflow-hidden flex flex-col md:flex-row relative">
                                {isLoading && (
                                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-200 overflow-hidden z-50">
                                        <div className="h-full bg-blue-600 animate-pulse">Loading...</div>
                                    </div>
                                )}
                                
                                <div className="bg-blue-700 p-8 text-white flex flex-col justify-center items-center md:w-2/5 text-center">
                                    <img src="https://i.ibb.co.com/5xhN0cm1/Logo-Donggala.png" alt="Logo" className="w-32 h-32 object-contain mb-6 drop-shadow-lg bg-white/10 rounded-full p-2" />
                                    <h1 className="text-2xl font-bold mb-2">e-KGB Donggala</h1>
                                    <p className="text-blue-100 text-sm">Sistem Informasi Kenaikan Gaji Berkala<br/>Dinas Pendidikan Pemuda & Olahraga</p>
                                </div>
                                <div className="p-8 md:w-3/5 bg-white">
                                    <div className="flex gap-4 border-b mb-6">
                                        <button onClick={()=>setLoginTab('pegawai')} className={`flex-1 pb-3 font-bold transition-all text-sm sm:text-base ${loginTab==='pegawai'?'text-blue-600 border-b-2 border-blue-600':'text-gray-400 hover:text-blue-400'}`}>Pemohon</button>
                                        <button onClick={()=>setLoginTab('verifikator')} className={`flex-1 pb-3 font-bold transition-all text-sm sm:text-base ${loginTab==='verifikator'?'text-amber-500 border-b-2 border-amber-500':'text-gray-400 hover:text-amber-400'}`}>Verifikator</button>
                                        <button onClick={()=>setLoginTab('kadis')} className={`flex-1 pb-3 font-bold transition-all text-sm sm:text-base ${loginTab==='kadis'?'text-emerald-600 border-b-2 border-emerald-600':'text-gray-400 hover:text-emerald-400'}`}>Kadis</button>
                                    </div>
                                    
                                    <div className="space-y-6">
                                        {loginTab === 'pegawai' ? (
                                            <form onSubmit={handleLoginPegawai} className="space-y-4">
                                                <div>
                                                    <label className="text-sm font-medium text-slate-600 block mb-1">Nomor Induk Pegawai (NIP)</label>
                                                    <input type="text" placeholder="Ketik NIP Anda..." required className="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 font-medium" value={loginForm.nip} onChange={handlePegawaiNipChange} />
                                                </div>
                                                <div>
                                                    <label className="text-sm font-medium text-slate-600 block mb-1">Nama Lengkap</label>
                                                    <input type="text" placeholder="Masukkan Nama" required className={`w-full px-4 py-3 bg-white border rounded-lg focus:outline-none focus:ring-4 transition-colors ${applications.find(a=>a.nip===loginForm.nip) ? 'border-green-400 bg-green-50 text-green-800 font-bold' : 'border-slate-300 focus:border-blue-500 focus:ring-blue-500/20'}`} value={loginForm.nama} onChange={e => setLoginForm({...loginForm, nama: e.target.value})} />
                                                    {applications.find(a=>a.nip===loginForm.nip) && <p className="text-xs text-green-600 mt-1"><i className="fas fa-check-circle"></i> Data ditemukan! Nama & WA diisi otomatis.</p>}
                                                </div>
                                                <div>
                                                    <label className="text-sm font-medium text-slate-600 block mb-1">No. WhatsApp</label>
                                                    <input type="tel" maxLength="15" placeholder="Contoh: 08123456789" required className={`w-full px-4 py-3 bg-white border rounded-lg focus:outline-none focus:ring-4 transition-colors ${applications.find(a=>a.nip===loginForm.nip) ? 'border-green-400 bg-green-50 text-green-800 font-bold' : 'border-slate-300 focus:border-blue-500 focus:ring-blue-500/20'}`} value={loginForm.wa} onChange={handlePegawaiWaChange} />
                                                </div>
                                                <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-bold shadow-md mt-2">Masuk ke Dashboard</button>
                                            </form>
                                        ) : (
                                            <form onSubmit={handleAdminLogin} className="space-y-4">
                                                <div className="bg-slate-50 p-4 rounded-lg mb-4 text-sm text-slate-600 border flex items-start gap-2">
                                                    <i className="fas fa-info-circle text-blue-500 mt-0.5"></i>
                                                    <p>Silakan masukkan Username dan Password untuk mengakses sistem {loginTab === 'kadis' ? 'Persetujuan Kepala Dinas' : 'Verifikasi Kepegawaian'}.</p>
                                                </div>
                                                <div>
                                                    <label className="text-sm font-medium text-slate-600 block mb-1">Username</label>
                                                    <input type="text" placeholder="Ketik username..." required className="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20" value={authForm.username} onChange={e => setAuthForm({...authForm, username: e.target.value})} />
                                                </div>
                                                <div>
                                                    <label className="text-sm font-medium text-slate-600 block mb-1">Password</label>
                                                    <input type="password" placeholder="Ketik password..." required className="w-full px-4 py-3 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} />
                                                </div>
                                                <button type="submit" disabled={isLoading} className={`w-full text-white py-3 rounded-lg font-bold shadow-md mt-2 disabled:opacity-50 ${loginTab === 'verifikator' ? 'bg-amber-500 hover:bg-amber-600' : 'bg-emerald-600 hover:bg-emerald-700'}`}>
                                                    {isLoading ? 'Memproses...' : `Masuk sebagai ${loginTab === 'kadis' ? 'Kadis' : 'Verifikator'}`}
                                                </button>
                                            </form>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (user.role === 'pegawai') {
                    const myApps = applications.filter(app => app.nip === user.data.nip);
                    return (
                        <AppLayout title="Dashboard Pegawai" user={user} isLoading={isLoading} onLogout={handleLogout} onRefresh={fetchData}>
                            <div className="bg-white rounded-xl shadow-sm border overflow-hidden mb-6 flex">
                                <button onClick={() => setActiveTab('list')} className={`flex-1 py-3 text-sm font-medium ${activeTab === 'list' ? 'bg-blue-50 text-blue-700 border-b-2 border-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>Riwayat Pengajuan</button>
                                <button onClick={() => setActiveTab('form')} className={`flex-1 py-3 text-sm font-medium ${activeTab === 'form' ? 'bg-blue-50 text-blue-700 border-b-2 border-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>+ Buat Pengajuan Baru</button>
                            </div>

                            {activeTab === 'list' && (
                                <div className="bg-white rounded-xl shadow-sm border p-6">
                                    {myApps.length === 0 ? <div className="text-center py-12 text-slate-500">Belum ada data pengajuan.</div> : (
                                        <div className="space-y-4">
                                            {myApps.map(app => (
                                                <div key={app.id} className="border rounded-xl p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50 hover:border-blue-300">
                                                    <div>
                                                        <div className="text-xs text-slate-500 mb-1">Diajukan: {formatDate(app.timestamp)}</div>
                                                        <div className="font-bold text-slate-800">{app.pangkatGol} - {app.jabatan}</div>
                                                        <div className="text-sm text-slate-600">Gaji Baru: {formatRupiah(app.gajiBaru)} (Berlaku {formatDate(app.tglBerlaku)})</div>
                                                    </div>
                                                    <div className="flex flex-col items-end gap-2">
                                                        {getStatusBadge(app.status)}
                                                        {app.status === 'COMPLETED' && (
                                                            <div className="flex gap-2">
                                                                <button onClick={() => { setSelectedApp(app); setShowDocumentPreview(true); }} className="text-blue-600 text-sm font-medium hover:underline"><i className="fas fa-eye mr-1"></i> Preview SK</button>
                                                                {app.fileFinalUrl && <a href={app.fileFinalUrl} target="_blank" className="text-emerald-600 text-sm font-medium hover:underline"><i className="fas fa-download mr-1"></i> Unduh Asli</a>}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'form' && (
                                <form onSubmit={submitApplication} className="bg-white rounded-xl shadow-sm border p-6 space-y-8">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-5">
                                            <h3 className="font-bold border-b pb-2 text-slate-700 flex items-center gap-2"><i className="fas fa-id-card text-blue-500"></i> Data Pegawai & Jabatan</h3>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-sm font-semibold text-slate-600 block mb-1.5 cursor-pointer">Tempat Lahir</label>
                                                    <input type="text" required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:outline-none focus:border-blue-500 focus:ring-4" value={formData.tempatLahir} onChange={e=>setFormData({...formData, tempatLahir: e.target.value})}/>
                                                </div>
                                                <div>
                                                    <label className="text-sm font-semibold text-slate-600 block mb-1.5 cursor-pointer">Tanggal Lahir</label>
                                                    <input type="date" required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:outline-none focus:border-blue-500 focus:ring-4" value={formData.tanggalLahir} onChange={e=>setFormData({...formData, tanggalLahir: e.target.value})}/>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-sm font-semibold text-slate-600 block mb-1.5 cursor-pointer">Pangkat/Golongan</label>
                                                <select required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:outline-none focus:border-blue-500 focus:ring-4 text-slate-700 font-medium cursor-pointer" value={formData.pangkatGol} onChange={handleGolonganChange}>
                                                    <option value="" disabled>-- Pilih Pangkat dan Golongan --</option>
                                                    {GOLONGAN_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-sm font-semibold text-slate-600 block mb-1.5 cursor-pointer">Jabatan</label>
                                                <input type="text" required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:outline-none focus:border-blue-500 focus:ring-4" value={formData.jabatan} onChange={e=>setFormData({...formData, jabatan: e.target.value})}/>
                                            </div>
                                            <div>
                                                <label className="text-sm font-semibold text-slate-600 block mb-1.5 cursor-pointer">Unit Kerja</label>
                                                <input type="text" required className="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:outline-none focus:border-blue-500 focus:ring-4" value={formData.unitKerja} onChange={e=>setFormData({...formData, unitKerja: e.target.value})}/>
                                            </div>
                                        </div>

                                        <div className="space-y-5">
                                            <h3 className="font-bold border-b pb-2 text-slate-700 flex items-center gap-2"><i className="fas fa-money-bill-wave text-emerald-500"></i> Data Gaji & Masa Kerja</h3>
                                            
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                                                <p className="text-sm font-bold mb-3 text-slate-700"><i className="fas fa-history text-slate-400 mr-1"></i> Berdasarkan SK Lama:</p>
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                                    <div>
                                                        <label className="text-xs font-semibold text-slate-600 block mb-1 cursor-pointer">Gaji Lama (Rp)</label>
                                                        <input type="number" required className="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2" value={formData.gajiLama} onChange={e=>setFormData({...formData, gajiLama: e.target.value})}/>
                                                    </div>
                                                    <div>
                                                        <label className="text-xs font-semibold text-slate-600 block mb-1 cursor-pointer">Tanggal SK Lama</label>
                                                        <input type="date" required className="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2" value={formData.tglGajiLama} onChange={e=>setFormData({...formData, tglGajiLama: e.target.value})}/>
                                                    </div>
                                                    <div>
                                                        <label className="text-xs font-semibold text-slate-600 block mb-1 cursor-pointer">TMT Lama</label>
                                                        <input type="date" required className="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2" value={formData.tmtLama} onChange={e=>setFormData({...formData, tmtLama: e.target.value})}/>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="text-xs font-semibold text-slate-600 block mb-1">Masa Kerja Lama:</label>
                                                    <div className="flex gap-2 items-center">
                                                        <input type="number" placeholder="Tahun" required className="w-24 px-3 py-2 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 text-center" value={formData.masaKerjaLamaTahun} onChange={e=>setFormData({...formData, masaKerjaLamaTahun: e.target.value})}/>
                                                        <label className="text-xs text-slate-500 cursor-pointer">Thn</label>
                                                        <input type="number" placeholder="Bulan" required className="w-24 px-3 py-2 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 text-center" value={formData.masaKerjaLamaBulan} onChange={e=>setFormData({...formData, masaKerjaLamaBulan: e.target.value})}/>
                                                        <label className="text-xs text-slate-500 cursor-pointer">Bln</label>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="border-t pt-4">
                                        <label className="block text-sm font-medium text-slate-700 mb-2">Upload File KGB/SK Terakhir (PDF)</label>
                                        <div className="border-2 border-dashed border-slate-300 rounded-lg p-6 text-center hover:bg-slate-50">
                                            <input type="file" id="fileUpload" accept=".pdf,image/*" className="hidden" onChange={e => setFileBerkalaObj(e.target.files[0])} />
                                            <label htmlFor="fileUpload" className="cursor-pointer flex flex-col items-center">
                                                <i className="fas fa-upload text-2xl text-slate-400 mb-2"></i>
                                                <span className="text-sm text-blue-600 font-medium">{fileBerkalaObj ? fileBerkalaObj.name : 'Klik untuk memilih file PDF'}</span>
                                            </label>
                                        </div>
                                    </div>
                                    <div className="flex justify-end pt-4">
                                        <button type="submit" disabled={isLoading} className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-medium flex items-center gap-2 disabled:bg-slate-400">
                                            <i className="fas fa-paper-plane"></i> {isLoading ? 'Mengirim...' : 'Kirim Pengajuan'}
                                        </button>
                                    </div>
                                </form>
                            )}
                        </AppLayout>
                    );
                }

                if (user.role === 'verifikator') {
                    const submittedApps = applications.filter(app => app.status === 'SUBMITTED');
                    const signedApps = applications.filter(app => app.status === 'SIGNED');
                    const completedApps = applications.filter(app => app.status === 'COMPLETED');

                    return (
                        <AppLayout title="Dashboard Verifikator Kepegawaian" user={user} isLoading={isLoading} onLogout={handleLogout} onRefresh={fetchData}>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-amber-200 border-l-4 border-l-amber-500 cursor-pointer" onClick={() => setActiveTab('verify')}>
                                    <div className="text-amber-600 text-sm font-bold mb-1">Perlu Verifikasi</div>
                                    <div className="text-3xl font-black text-slate-800">{submittedApps.length}</div>
                                </div>
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-purple-200 border-l-4 border-l-purple-500 cursor-pointer" onClick={() => setActiveTab('print')}>
                                    <div className="text-purple-600 text-sm font-bold mb-1">Siap Cetak & Upload</div>
                                    <div className="text-3xl font-black text-slate-800">{signedApps.length}</div>
                                </div>
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-emerald-200 border-l-4 border-l-emerald-500 cursor-pointer" onClick={() => setActiveTab('done')}>
                                    <div className="text-emerald-600 text-sm font-bold mb-1">Selesai</div>
                                    <div className="text-3xl font-black text-slate-800">{completedApps.length}</div>
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border p-6">
                                <h3 className="text-lg font-bold mb-4 border-b pb-2">
                                    {activeTab === 'print' ? 'Daftar Menunggu Cetak (Sudah di-TTD Kadis)' : activeTab === 'done' ? 'Daftar Selesai' : 'Daftar Pengajuan Baru'}
                                </h3>
                                {(() => {
                                    const listData = activeTab === 'print' ? signedApps : activeTab === 'done' ? completedApps : submittedApps;
                                    if (listData.length === 0) return <div className="text-center py-8 text-slate-500 italic">Tidak ada data di kategori ini.</div>;
                                    
                                    return (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm text-left">
                                                <thead className="bg-slate-50 text-slate-600 border-b">
                                                    <tr><th className="p-3">Tanggal</th><th className="p-3">Pegawai</th><th className="p-3">Gaji Baru Usulan</th><th className="p-3 text-center">Aksi</th></tr>
                                                </thead>
                                                <tbody>
                                                    {listData.map(app => (
                                                        <tr key={app.id} className="border-b hover:bg-slate-50">
                                                            <td className="p-3 text-slate-500">{formatDate(app.timestamp)}</td>
                                                            <td className="p-3"><div className="font-bold text-slate-800">{app.nama}</div><div className="text-xs text-slate-500">NIP. {app.nip}</div></td>
                                                            <td className="p-3"><div className="font-medium text-slate-800">{formatRupiah(app.gajiBaru)}</div><div className="text-xs text-slate-500">Gol. {app.pangkatGol.split(',')[1] || app.pangkatGol}</div></td>
                                                            <td className="p-3 flex justify-center items-center gap-2">
                                                                
                                                                {/* TOMBOL WA UNTUK SEMUA STATUS */}
                                                                <button onClick={() => handleWA(app.wa, app.nama, app.status)} className="bg-green-500 text-white px-2 py-1.5 rounded hover:bg-green-600 font-medium text-xs flex items-center gap-1 shadow-sm" title="Kirim Notifikasi WA">
                                                                    <i className="fab fa-whatsapp text-sm"></i> WA
                                                                </button>

                                                                {app.status === 'SUBMITTED' && (
                                                                    <>
                                                                        {app.fileBerkalaLamaUrl && <a href={app.fileBerkalaLamaUrl} target="_blank" className="bg-slate-100 text-slate-600 px-3 py-1.5 rounded hover:bg-slate-200 font-medium text-xs"><i className="fas fa-file-pdf mr-1"></i> Cek Berkas</a>}
                                                                        <button onClick={() => updateStatusKeDatabase(app.id, 'VERIFIED')} className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded hover:bg-blue-200 font-medium text-xs"><i className="fas fa-check-circle mr-1"></i> Setujui</button>
                                                                        <button onClick={() => { if(window.confirm('Tolak pengajuan ini karena berkas tidak sesuai?')) updateStatusKeDatabase(app.id, 'REJECTED') }} className="bg-red-100 text-red-700 px-3 py-1.5 rounded hover:bg-red-200 font-medium text-xs"><i className="fas fa-times-circle mr-1"></i> Tolak</button>
                                                                    </>
                                                                )}
                                                                {app.status === 'SIGNED' && (
                                                                    <button onClick={() => { setSelectedApp(app); setShowDocumentPreview(true); }} className="bg-purple-600 text-white px-3 py-1.5 rounded hover:bg-purple-700 font-medium text-xs"><i className="fas fa-print mr-1"></i> Cetak / Upload</button>
                                                                )}
                                                                {app.status === 'COMPLETED' && (
                                                                    <button onClick={() => { setSelectedApp(app); setShowDocumentPreview(true); }} className="bg-slate-100 text-slate-700 px-3 py-1.5 rounded hover:bg-slate-200 font-medium text-xs"><i className="fas fa-eye mr-1"></i> Lihat Dokumen</button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    );
                                })()}
                            </div>
                        </AppLayout>
                    );
                }

                if (user.role === 'kadis') {
                    const verifiedApps = applications.filter(app => app.status === 'VERIFIED');
                    return (
                        <AppLayout title="Persetujuan & Tanda Tangan Kepala Dinas" user={user} isLoading={isLoading} onLogout={handleLogout} onRefresh={fetchData}>
                            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                                <div className="bg-blue-50 p-4 border-b">
                                    <h3 className="font-bold text-blue-800"><i className="fas fa-file-signature mr-2"></i> Daftar Menunggu Keputusan Kadis</h3>
                                </div>
                                <div className="p-6">
                                    {verifiedApps.length === 0 ? (
                                        <div className="text-center py-12"><i className="fas fa-check-circle text-4xl text-slate-300 mb-4 block"></i><p className="text-slate-500">Tidak ada dokumen yang perlu ditandatangani saat ini.</p></div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {verifiedApps.map(app => (
                                                <div key={app.id} className="border rounded-xl p-5 bg-slate-50 relative">
                                                    <div className="flex items-center gap-3 mb-4">
                                                        <div className="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-lg">{app.nama.charAt(0)}</div>
                                                        <div><h4 className="font-bold text-slate-800">{app.nama}</h4><p className="text-xs text-slate-500">NIP. {app.nip}</p></div>
                                                    </div>
                                                    <div className="bg-white p-3 rounded border text-sm mb-4 space-y-1">
                                                        <div className="flex justify-between"><span className="text-slate-500">Jabatan:</span> <span className="font-medium text-right">{app.jabatan}</span></div>
                                                        <div className="flex justify-between border-t border-dashed mt-1 pt-1"><span className="text-slate-800 font-bold">Usulan Gaji Baru:</span> <span className="font-bold text-blue-600">{formatRupiah(app.gajiBaru)}</span></div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => {setSelectedApp(app); setShowDocumentPreview(true);}} className="flex-1 bg-white border border-blue-600 text-blue-600 py-2 rounded text-sm font-medium"><i className="fas fa-eye mr-1"></i> Draft SK</button>
                                                        <button onClick={() => {setSelectedApp(app); setShowSignaturePad(true);}} className="flex-1 bg-blue-600 text-white py-2 rounded text-sm font-medium"><i className="fas fa-pen-nib mr-1"></i> Tanda Tangani</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {showSignaturePad && selectedApp && (
                                <SignaturePad onSave={handleKadisSign} onCancel={() => {setShowSignaturePad(false); setSelectedApp(null);}} />
                            )}
                        </AppLayout>
                    );
                }

                return null;
            };

            return (
                <>
                    {/* BAGIAN INI HANYA TAMPIL DI LAYAR, DAN AKAN HILANG SAAT DICETAK (print:hidden) */}
                    <div className="print:hidden">
                        {renderViews()}
                        
                        {/* MODAL PREVIEW & MENU CETAK */}
                        {showDocumentPreview && selectedApp && (
                            <div className="fixed inset-0 bg-slate-900/90 z-50 flex flex-col overflow-y-auto">
                                <div className="bg-white border-b px-6 py-4 flex flex-col sm:flex-row justify-between items-center sticky top-0 z-20 shadow-md gap-4">
                                    <div>
                                        <h3 className="font-bold text-lg">{user.role === 'verifikator' ? 'Menu Cetak & Upload SK' : 'Preview SK KGB'}</h3>
                                        {user.role === 'verifikator' && <p className="text-xs text-slate-500">Silakan Cetak Dokumen, stempel basah, lalu Upload file PDF Finalnya.</p>}
                                    </div>
                                    <div className="flex gap-2">
                                        {user.role === 'verifikator' && selectedApp.status === 'SIGNED' && (
                                            <>
                                                <button onClick={handlePrint} className="bg-slate-800 text-white px-4 py-2 rounded font-medium"><i className="fas fa-print mr-1"></i> 1. Cetak Fisik</button>
                                                <div className="relative">
                                                    <input type="file" id="uploadFinal" className="hidden" accept=".pdf" onChange={e => setFileFinalObj(e.target.files[0])} />
                                                    <label htmlFor="uploadFinal" className="bg-amber-500 text-white px-4 py-2 rounded font-medium cursor-pointer inline-block"><i className="fas fa-file-pdf mr-1"></i> {fileFinalObj ? 'File Dipilih!' : '2. Pilih PDF Scan'}</label>
                                                </div>
                                                <button onClick={handleUploadFinal} disabled={isLoading} className="bg-emerald-600 text-white px-4 py-2 rounded font-medium disabled:bg-slate-400"><i className="fas fa-upload mr-1"></i> 3. Upload & Selesai</button>
                                            </>
                                        )}
                                        {user.role === 'kadis' && (
                                            <button onClick={() => {setShowDocumentPreview(false); setShowSignaturePad(true);}} className="bg-blue-600 text-white px-4 py-2 rounded font-medium">Lanjut TTD</button>
                                        )}
                                        <button onClick={() => setShowDocumentPreview(false)} className="bg-slate-100 text-slate-600 px-4 py-2 rounded font-medium"><i className="fas fa-times mr-1"></i> Tutup</button>
                                    </div>
                                </div>
                                <div className="p-8 flex-grow bg-slate-200 flex justify-center items-start">
                                    <div className="shadow-2xl"><SuratBerkala data={selectedApp} /></div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* BAGIAN INI HANYA TAMPIL SAAT DI MESIN CETAK PRINTER (hidden print:block) */}
                    <div className="hidden print:block w-full bg-white text-black">
                        {selectedApp && <SuratBerkala data={selectedApp} />}
                    </div>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
