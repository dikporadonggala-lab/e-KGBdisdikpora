                                </h3>
                                {(() => {
                                    const listData = activeTab === 'print' ? signedApps : activeTab === 'done' ? completedApps : submittedApps;
                                    if (listData.length === 0) return <div className="text-center py-8 text-slate-500 italic">Tidak ada data di kategori ini.</div>;
                                    
                                    return (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm text-left">
                                                <thead className="bg-slate-50 text-slate-600 border-b">
                                                    <tr><th className="p-3">Tanggal</th><th className="p-3">Pegawai / Kec</th><th className="p-3">Gaji Baru Usulan</th><th className="p-3 text-center">Aksi</th></tr>
                                                </thead>
                                                <tbody>
                                                    {listData.map(app => (
                                                        <tr key={app.id} className="border-b hover:bg-slate-50">
                                                            <td className="p-3 text-slate-500">{formatDate(app.timestamp)}</td>
                                                            <td className="p-3">
                                                                <div className="font-bold text-slate-800">{app.nama}</div>
                                                                <div className="text-[10px] bg-blue-100 text-blue-800 px-1 py-0.5 rounded w-max mt-0.5">Kec. {app.kecamatan}</div>
                                                            </td>
                                                            <td className="p-3"><div className="font-medium text-slate-800">{formatRupiah(app.gajiBaru)}</div><div className="text-xs text-slate-500">Gol. {app.pangkatGol.split(',')[1] || app.pangkatGol}</div></td>
                                                            <td className="p-3 flex justify-center items-center gap-2">
                                                                
                                                                <button onClick={() => handleWA(app.wa, app.nama, app.status)} className="bg-green-500 text-white px-2 py-1.5 rounded hover:bg-green-600 font-medium text-xs flex items-center gap-1 shadow-sm" title="Kirim Notifikasi WA">
                                                                    <i className="fab fa-whatsapp text-sm"></i> WA
                                                                </button>

                                                                {app.status === 'SUBMITTED' && (
                                                                    <>
                                                                        {app.fileBerkalaLamaUrl && <a href={app.fileBerkalaLamaUrl} target="_blank" className="bg-slate-100 text-slate-600 px-3 py-1.5 rounded hover:bg-slate-200 font-medium text-xs"><i className="fas fa-file-pdf mr-1"></i> Cek Berkas</a>}
                                                                        
                                                                        <button onClick={() => {
                                                                            setSelectedApp(app);
                                                                            setPenomoranForm({
                                                                                nomorSkBaru: `12/822.2/DISDIKPORA/${new Date().getFullYear()}`,
                                                                                tglSkBaru: new Date().toISOString().split('T')[0],
                                                                                nomorSkLama: '50/822.2/DISDIKBUD',
                                                                                tglSkLama: app.tglGajiLama || ''
                                                                            });
                                                                            setShowPenomoranModal(true);
                                                                        }} className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded hover:bg-blue-200 font-medium text-xs"><i className="fas fa-check-circle mr-1"></i> Setujui</button>

                                                                        <button onClick={() => { if(window.confirm('Apakah Anda yakin ingin MENOLAK pengajuan ini karena berkas tidak sesuai?')) updateStatusKeDatabase(app.id, 'REJECTED') }} className="bg-red-100 text-red-700 px-3 py-1.5 rounded hover:bg-red-200 font-medium text-xs"><i className="fas fa-times-circle mr-1"></i> Tolak</button>
                                                                    </>
                                                                )}
                                                                {app.status === 'SIGNED' && (
                                                                    <button onClick={() => handleOpenPreview(app)} className="bg-purple-600 text-white px-3 py-1.5 rounded hover:bg-purple-700 font-medium text-xs"><i className="fas fa-print mr-1"></i> Cetak / Upload</button>
                                                                )}
                                                                {app.status === 'COMPLETED' && (
                                                                    <button onClick={() => handleOpenPreview(app)} className="bg-slate-100 text-slate-700 px-3 py-1.5 rounded hover:bg-slate-200 font-medium text-xs"><i className="fas fa-eye mr-1"></i> Lihat Dokumen</button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    );
                                })()}
                            </div>
                        </AppLayout>
                    );
                }

                if (user.role === 'kadis') {
                    const verifiedApps = applications.filter(app => app.status === 'VERIFIED');
                    return (
                        <AppLayout title="Persetujuan & Tanda Tangan Kepala Dinas" user={user} isLoading={isLoading} onLogout={handleLogout} onRefresh={fetchData}>
                            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                                <div className="bg-blue-50 p-4 border-b">
                                    <h3 className="font-bold text-blue-800"><i className="fas fa-file-signature mr-2"></i> Daftar Menunggu Keputusan Kadis</h3>
                                </div>
                                <div className="p-6">
                                    {verifiedApps.length === 0 ? (
                                        <div className="text-center py-12"><i className="fas fa-check-circle text-4xl text-slate-300 mb-4 block"></i><p className="text-slate-500">Tidak ada dokumen yang perlu ditandatangani saat ini.</p></div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {verifiedApps.map(app => (
                                                <div key={app.id} className="border rounded-xl p-5 bg-slate-50 relative">
                                                    <div className="flex items-center gap-3 mb-4">
                                                        <div className="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-lg">{app.nama.charAt(0)}</div>
                                                        <div><h4 className="font-bold text-slate-800">{app.nama}</h4><p className="text-xs text-slate-500">NIP. {app.nip} • Kec. {app.kecamatan}</p></div>
                                                    </div>
                                                    <div className="bg-white p-3 rounded border text-sm mb-4 space-y-1">
                                                        <div className="flex justify-between"><span className="text-slate-500">Jabatan:</span> <span className="font-medium text-right">{app.jabatan}</span></div>
                                                        <div className="flex justify-between border-t border-dashed mt-1 pt-1"><span className="text-slate-800 font-bold">Usulan Gaji Baru:</span> <span className="font-bold text-blue-600">{formatRupiah(app.gajiBaru)}</span></div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => handleOpenPreview(app)} className="flex-1 bg-white border border-blue-600 text-blue-600 py-2 rounded text-sm font-medium"><i className="fas fa-eye mr-1"></i> Draft SK</button>
                                                        <button onClick={() => {setSelectedApp(app); setShowSignaturePad(true);}} className="flex-1 bg-blue-600 text-white py-2 rounded text-sm font-medium"><i className="fas fa-pen-nib mr-1"></i> Tanda Tangani</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {showSignaturePad && selectedApp && (
                                <SignaturePad onSave={handleKadisSign} onCancel={() => {setShowSignaturePad(false); setSelectedApp(null);}} />
                            )}
                        </AppLayout>
                    );
                }

                return null;
            };

            return (
                <>
                    <div className="print:hidden">
                        {renderViews()}
                        
                        {/* MODAL PENOMORAN SK OLEH VERIFIKATOR */}
                        {showPenomoranModal && selectedApp && (
                            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
                                    <div className="p-4 bg-blue-700 text-white flex justify-between items-center">
                                        <h3 className="font-bold"><i className="fas fa-edit mr-2"></i>Penomoran SK Berkala</h3>
                                        <button onClick={() => setShowPenomoranModal(false)} className="text-blue-200 hover:text-white"><i className="fas fa-times"></i></button>
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <div className="bg-amber-50 border border-amber-200 text-amber-800 text-sm p-3 rounded-lg">
                                            <i className="fas fa-info-circle mr-1"></i> Silakan lengkapi Nomor dan Tanggal Surat Keputusan secara definitif sebelum diteruskan ke Kepala Dinas.
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-1">Nomor SK Baru</label>
                                                <input type="text" className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none" value={penomoranForm.nomorSkBaru} onChange={e => setPenomoranForm({...penomoranForm, nomorSkBaru: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-1">Tanggal SK Baru</label>
                                                <input type="date" className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none" value={penomoranForm.tglSkBaru} onChange={e => setPenomoranForm({...penomoranForm, tglSkBaru: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-2 border-t">
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-1">Nomor SK Terakhir</label>
                                                <input type="text" className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none" value={penomoranForm.nomorSkLama} onChange={e => setPenomoranForm({...penomoranForm, nomorSkLama: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-1">Tanggal SK Terakhir</label>
                                                <input type="date" className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none" value={penomoranForm.tglSkLama} onChange={e => setPenomoranForm({...penomoranForm, tglSkLama: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-4 border-t flex justify-end gap-2 bg-slate-50">
                                        <button onClick={() => setShowPenomoranModal(false)} className="px-4 py-2 text-slate-600 bg-slate-200 hover:bg-slate-300 rounded-lg font-medium transition-colors">Batal</button>
                                        <button onClick={handleSimpanPenomoran} disabled={isLoading} className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition-colors disabled:opacity-50">
                                            {isLoading ? 'Memproses...' : 'Simpan & Teruskan'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MODAL PREVIEW & MENU CETAK */}
                        {showDocumentPreview && selectedApp && (
                            <div className="fixed inset-0 bg-slate-900/90 z-50 flex flex-col overflow-y-auto">
                                <div className="bg-white border-b px-6 py-4 flex flex-col sm:flex-row justify-between items-center sticky top-0 z-20 shadow-md gap-4">
                                    <div>
                                        <h3 className="font-bold text-lg">{user.role === 'verifikator' ? 'Menu Cetak & Upload SK' : 'Preview SK KGB'}</h3>
                                        {user.role === 'verifikator' && <p className="text-xs text-slate-500">Silakan Cetak Dokumen, stempel basah, lalu Upload file PDF Finalnya.</p>}
                                    </div>
                                    <div className="flex gap-2">
                                        {user.role === 'verifikator' && selectedApp.status === 'SIGNED' && (
                                            <>
                                                <button onClick={handlePrint} className="bg-slate-800 text-white px-4 py-2 rounded font-medium"><i className="fas fa-print mr-1"></i> 1. Cetak Fisik</button>
                                                <div className="relative">
                                                    <input type="file" id="uploadFinal" className="hidden" accept=".pdf" onChange={e => setFileFinalObj(e.target.files[0])} />
                                                    <label htmlFor="uploadFinal" className="bg-amber-500 text-white px-4 py-2 rounded font-medium cursor-pointer inline-block"><i className="fas fa-file-pdf mr-1"></i> {fileFinalObj ? 'File Dipilih!' : '2. Pilih PDF Scan'}</label>
                                                </div>
                                                <button onClick={handleUploadFinal} disabled={isLoading} className="bg-emerald-600 text-white px-4 py-2 rounded font-medium disabled:bg-slate-400"><i className="fas fa-upload mr-1"></i> 3. Upload & Selesai</button>
                                            </>
                                        )}
                                        {user.role === 'kadis' && selectedApp.status === 'VERIFIED' && (
                                            <button onClick={() => {setShowDocumentPreview(false); setShowSignaturePad(true);}} className="bg-blue-600 text-white px-4 py-2 rounded font-medium">Lanjut TTD</button>
                                        )}
                                        <button onClick={() => setShowDocumentPreview(false)} className="bg-slate-100 text-slate-600 px-4 py-2 rounded font-medium"><i className="fas fa-times mr-1"></i> Tutup</button>
                                    </div>
                                </div>
                                
                                <div className="p-6 flex-grow bg-slate-200 flex justify-center items-start">
                                    <div className="shadow-2xl"><SuratBerkala data={selectedApp} printData={printData} /></div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* BAGIAN INI HANYA TAMPIL SAAT DI MESIN CETAK PRINTER (hidden print:block) */}
                    <div className="hidden print:block w-full bg-white text-black">
                        {selectedApp && <SuratBerkala data={selectedApp} printData={printData} />}
                    </div>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
